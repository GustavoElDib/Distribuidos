# Portas remapeadas para não colidir com os stacks docker-compose.machine1.yml
# e docker-compose.machine2.yml (que ocupam 8000-8005 / 9000-9005 no host)
# quando ambos precisam rodar ao mesmo tempo na mesma máquina.
services:
  bank_0:
    ports: !override
      - "18000:8000"
      - "19000:9000"
  bank_1:
    ports: !override
      - "18001:8001"
      - "19001:9001"
  bank_2:
    ports: !override
      - "18002:8002"
      - "19002:9002"
  bank_3:
    ports: !override
      - "18003:8003"
      - "19003:9003"
  bank_4:
    ports: !override
      - "18004:8004"
      - "19004:9004"
  bank_5:
    ports: !override
      - "18005:8005"
      - "19005:9005"
